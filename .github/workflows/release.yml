name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify DLL exists
        run: |
          if [ ! -f dist/DANO.Core.dll ]; then
            echo "::error::dist/DANO.Core.dll not found. Build locally and commit before tagging."
            exit 1
          fi

      - name: Package release zip
        run: |
          cd dist
          zip ../DANO-${{ steps.version.outputs.version }}.zip DANO.Core.dll
          cp ../DANO-${{ steps.version.outputs.version }}.zip ../DANO.zip

      - name: Pack NuGet package
        run: |
          dotnet pack nuget/DANO.Core.Pack.csproj \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            --output ./nupkg

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD -- ':!dist/')
          else
            NOTES=$(git log --pretty=format:"- %s" -- ':!dist/')
          fi
          echo "$NOTES" > release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DANO v${{ steps.version.outputs.version }}
          body_path: release_notes.txt
          files: |
            DANO-${{ steps.version.outputs.version }}.zip
            DANO.zip
            nupkg/*.nupkg
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
